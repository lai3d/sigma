<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma K8s Deployment Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
    background: #0a0e1a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 32px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    margin-bottom: 40px;
  }
  svg {
    display: block;
    margin: 0 auto;
  }

  /* Tooltip */
  .node:hover .tooltip-bg { opacity: 1; }
  .node:hover .tooltip-text { opacity: 1; }
  .node { cursor: default; }

  /* Animations */
  @keyframes flowRight {
    0% { stroke-dashoffset: 16; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes flowDown {
    0% { stroke-dashoffset: 16; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .flow-line {
    animation: flowRight 0.8s linear infinite;
  }
  .flow-line-down {
    animation: flowDown 0.8s linear infinite;
  }
  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 32px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #94a3b8;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }
</style>
</head>
<body>

<h1>Sigma K8s Deployment Architecture</h1>
<p class="subtitle">namespace: sigma &mdash; CloudNativePG HA + PgBouncer Pool + Multi-Replica Services</p>

<svg viewBox="0 0 1200 920" width="1200" height="920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="gIngress" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gWeb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gApi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gPool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="gPgPrimary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gPgReplica" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="gRedis" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="gAgent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="gProbe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <!-- ==================== K8s Cluster Boundary ==================== -->
  <rect x="30" y="50" width="1140" height="680" rx="16" ry="16"
        fill="none" stroke="#1e293b" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="42" y="36" width="200" height="28" rx="6" fill="#0a0e1a"/>
  <text x="52" y="55" font-size="13" fill="#475569" font-weight="600">
    Kubernetes Cluster (sigma)
  </text>

  <!-- ==================== Internet / Users ==================== -->
  <g class="node" transform="translate(540, 10)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#1e293b" filter="shadow"/>
    <text x="60" y="23" text-anchor="middle" font-size="13" fill="#94a3b8" font-weight="600">Internet</text>
  </g>

  <!-- Arrow: Internet -> Ingress -->
  <line x1="600" y1="46" x2="600" y2="78" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== Ingress ==================== -->
  <g class="node" transform="translate(480, 80)">
    <rect x="0" y="0" width="240" height="52" rx="10" fill="url(#gIngress)" filter="shadow" opacity="0.95"/>
    <text x="120" y="21" text-anchor="middle" font-size="11" fill="#fef3c7" font-weight="500">nginx ingress</text>
    <text x="120" y="38" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">sigma.yourdomain.com</text>
  </g>

  <!-- ==================== Routing Labels ==================== -->
  <!-- Ingress -> Web -->
  <path d="M 540 132 L 300 180" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)" stroke-dasharray="5,3" class="flow-line"/>
  <text x="395" y="148" font-size="10" fill="#60a5fa" font-weight="500" transform="rotate(-13,395,148)">/* (static)</text>

  <!-- Ingress -> API -->
  <path d="M 660 132 L 800 180" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3" class="flow-line"/>
  <text x="740" y="148" font-size="10" fill="#a78bfa" font-weight="500" transform="rotate(13,740,148)">/api/*</text>

  <!-- ==================== Web Pods ==================== -->
  <g transform="translate(140, 182)">
    <!-- Service -->
    <rect x="10" y="-10" width="300" height="110" rx="12" fill="#111827" stroke="#1e3a5f" stroke-width="1" opacity="0.7"/>
    <text x="160" y="6" text-anchor="middle" font-size="10" fill="#60a5fa" font-weight="500">sigma-web-service :80  (ClusterIP)</text>

    <!-- Pod 1 -->
    <g class="node" transform="translate(20, 16)">
      <rect x="0" y="0" width="120" height="68" rx="8" fill="url(#gWeb)" filter="shadow" opacity="0.9"/>
      <text x="60" y="22" text-anchor="middle" font-size="10" fill="#dbeafe" font-weight="500">Pod</text>
      <text x="60" y="40" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">sigma-web</text>
      <text x="60" y="56" text-anchor="middle" font-size="10" fill="#bfdbfe">nginx:alpine</text>
    </g>

    <!-- Pod 2 -->
    <g class="node" transform="translate(170, 16)">
      <rect x="0" y="0" width="120" height="68" rx="8" fill="url(#gWeb)" filter="shadow" opacity="0.9"/>
      <text x="60" y="22" text-anchor="middle" font-size="10" fill="#dbeafe" font-weight="500">Pod</text>
      <text x="60" y="40" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">sigma-web</text>
      <text x="60" y="56" text-anchor="middle" font-size="10" fill="#bfdbfe">nginx:alpine</text>
    </g>

    <text x="160" y="100" text-anchor="middle" font-size="10" fill="#475569">replicas: 2</text>
  </g>

  <!-- ==================== API Pods ==================== -->
  <g transform="translate(660, 182)">
    <!-- Service -->
    <rect x="10" y="-10" width="300" height="110" rx="12" fill="#111827" stroke="#2e1065" stroke-width="1" opacity="0.7"/>
    <text x="160" y="6" text-anchor="middle" font-size="10" fill="#a78bfa" font-weight="500">sigma-api-service :3000  (ClusterIP)</text>

    <!-- Pod 1 -->
    <g class="node" transform="translate(20, 16)">
      <rect x="0" y="0" width="120" height="68" rx="8" fill="url(#gApi)" filter="shadow" opacity="0.9"/>
      <text x="60" y="22" text-anchor="middle" font-size="10" fill="#ede9fe" font-weight="500">Pod</text>
      <text x="60" y="40" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">sigma-api</text>
      <text x="60" y="56" text-anchor="middle" font-size="10" fill="#ddd6fe">Rust / Axum</text>
    </g>

    <!-- Pod 2 -->
    <g class="node" transform="translate(170, 16)">
      <rect x="0" y="0" width="120" height="68" rx="8" fill="url(#gApi)" filter="shadow" opacity="0.9"/>
      <text x="60" y="22" text-anchor="middle" font-size="10" fill="#ede9fe" font-weight="500">Pod</text>
      <text x="60" y="40" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">sigma-api</text>
      <text x="60" y="56" text-anchor="middle" font-size="10" fill="#ddd6fe">Rust / Axum</text>
    </g>

    <text x="160" y="100" text-anchor="middle" font-size="10" fill="#475569">replicas: 2</text>
  </g>

  <!-- ==================== Redis ==================== -->
  <g class="node" transform="translate(100, 410)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="url(#gRedis)" filter="shadow" opacity="0.9"/>
    <text x="80" y="22" text-anchor="middle" font-size="10" fill="#fecaca" font-weight="500">redis-service :6379</text>
    <text x="80" y="42" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">Redis</text>
    <text x="80" y="56" text-anchor="middle" font-size="9" fill="#fca5a5">rate limiting + cache</text>
  </g>

  <!-- Arrow: API -> Redis -->
  <path d="M 770 298 L 770 340 Q 770 360 750 360 L 270 410" stroke="#ef4444" stroke-width="1.2" fill="none" marker-end="url(#arrow)" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="500" y="358" font-size="9" fill="#f87171" text-anchor="middle">rate limit</text>

  <!-- ==================== PgBouncer Pooler ==================== -->
  <g transform="translate(480, 360)">
    <rect x="0" y="0" width="340" height="110" rx="12" fill="#111827" stroke="#155e75" stroke-width="1.5" opacity="0.8"/>
    <text x="170" y="18" text-anchor="middle" font-size="11" fill="#22d3ee" font-weight="600">sigma-db-pooler-rw  (ClusterIP)</text>

    <!-- Pooler 1 -->
    <g class="node" transform="translate(20, 28)">
      <rect x="0" y="0" width="136" height="60" rx="8" fill="url(#gPool)" filter="shadow" opacity="0.9"/>
      <text x="68" y="20" text-anchor="middle" font-size="10" fill="#cffafe" font-weight="500">PgBouncer</text>
      <text x="68" y="38" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Pooler #1</text>
      <text x="68" y="52" text-anchor="middle" font-size="9" fill="#a5f3fc">txn mode, pool=20</text>
    </g>

    <!-- Pooler 2 -->
    <g class="node" transform="translate(180, 28)">
      <rect x="0" y="0" width="136" height="60" rx="8" fill="url(#gPool)" filter="shadow" opacity="0.9"/>
      <text x="68" y="20" text-anchor="middle" font-size="10" fill="#cffafe" font-weight="500">PgBouncer</text>
      <text x="68" y="38" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Pooler #2</text>
      <text x="68" y="52" text-anchor="middle" font-size="9" fill="#a5f3fc">txn mode, pool=20</text>
    </g>

    <text x="170" y="104" text-anchor="middle" font-size="10" fill="#475569">instances: 2  |  max_client_conn: 100  |  default_pool_size: 20</text>
  </g>

  <!-- Arrow: API -> PgBouncer -->
  <line x1="810" y1="298" x2="720" y2="358" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3" class="flow-line-down"/>
  <text x="780" y="328" font-size="9" fill="#22d3ee" transform="rotate(28,780,328)">:5432</text>

  <!-- ==================== CloudNativePG Cluster ==================== -->
  <g transform="translate(340, 520)">
    <!-- CNPG Cluster boundary -->
    <rect x="0" y="0" width="540" height="180" rx="14" fill="#0f1d14" stroke="#065f46" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="270" y="20" text-anchor="middle" font-size="12" fill="#34d399" font-weight="600">CloudNativePG Cluster &mdash; PostgreSQL 16.6</text>

    <!-- Primary -->
    <g class="node" transform="translate(30, 34)">
      <rect x="0" y="0" width="150" height="90" rx="8" fill="url(#gPgPrimary)" filter="shadow"/>
      <!-- Crown icon for primary -->
      <text x="75" y="22" text-anchor="middle" font-size="10" fill="#d1fae5" font-weight="700">PRIMARY (RW)</text>
      <text x="75" y="44" text-anchor="middle" font-size="15" fill="#fff" font-weight="700">sigma-db-1</text>
      <text x="75" y="62" text-anchor="middle" font-size="9" fill="#a7f3d0">max_conn: 200</text>
      <text x="75" y="76" text-anchor="middle" font-size="9" fill="#a7f3d0">shared_buf: 256MB</text>
    </g>

    <!-- Replica 1 -->
    <g class="node" transform="translate(200, 34)">
      <rect x="0" y="0" width="140" height="90" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1" filter="shadow"/>
      <text x="70" y="22" text-anchor="middle" font-size="10" fill="#6ee7b7" font-weight="600">REPLICA (RO)</text>
      <text x="70" y="44" text-anchor="middle" font-size="14" fill="#ecfdf5" font-weight="700">sigma-db-2</text>
      <text x="70" y="62" text-anchor="middle" font-size="9" fill="#a7f3d0">streaming</text>
      <text x="70" y="76" text-anchor="middle" font-size="9" fill="#a7f3d0">replication</text>
    </g>

    <!-- Replica 2 -->
    <g class="node" transform="translate(360, 34)">
      <rect x="0" y="0" width="140" height="90" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="1" filter="shadow"/>
      <text x="70" y="22" text-anchor="middle" font-size="10" fill="#6ee7b7" font-weight="600">REPLICA (RO)</text>
      <text x="70" y="44" text-anchor="middle" font-size="14" fill="#ecfdf5" font-weight="700">sigma-db-3</text>
      <text x="70" y="62" text-anchor="middle" font-size="9" fill="#a7f3d0">streaming</text>
      <text x="70" y="76" text-anchor="middle" font-size="9" fill="#a7f3d0">replication</text>
    </g>

    <!-- Replication arrows -->
    <path d="M 170 79 L 200 79" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowGreen)" opacity="0.6"/>
    <path d="M 170 79 Q 185 110 270 110 Q 355 110 370 79" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowGreen)" opacity="0.6" fill="none"/>

    <!-- PVC labels -->
    <g transform="translate(30, 130)">
      <rect x="0" y="0" width="150" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="75" y="15" text-anchor="middle" font-size="9" fill="#94a3b8">PVC: 10Gi</text>
    </g>
    <g transform="translate(200, 130)">
      <rect x="0" y="0" width="140" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="70" y="15" text-anchor="middle" font-size="9" fill="#94a3b8">PVC: 10Gi</text>
    </g>
    <g transform="translate(360, 130)">
      <rect x="0" y="0" width="140" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="70" y="15" text-anchor="middle" font-size="9" fill="#94a3b8">PVC: 10Gi</text>
    </g>

    <!-- Service labels -->
    <text x="270" y="172" text-anchor="middle" font-size="10" fill="#065f46">sigma-db-rw :5432 (primary)  |  sigma-db-ro :5432 (replicas)</text>
  </g>

  <!-- Arrow: PgBouncer -> PG Primary -->
  <path d="M 650 470 L 650 490 Q 650 510 620 515 L 500 534" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="5,3" class="flow-line-down"/>
  <text x="590" y="505" font-size="9" fill="#34d399">rw :5432</text>

  <!-- ==================== External Agents (outside K8s) ==================== -->
  <rect x="30" y="740" width="1140" height="150" rx="14"
        fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="42" y="726" width="280" height="28" rx="6" fill="#0a0e1a"/>
  <text x="52" y="746" font-size="13" fill="#475569" font-weight="600">
    External (deployed on VPS nodes, not in K8s)
  </text>

  <!-- Agent nodes -->
  <g transform="translate(60, 770)">
    <g class="node" transform="translate(0, 0)">
      <rect x="0" y="0" width="140" height="72" rx="8" fill="url(#gAgent)" filter="shadow" opacity="0.9"/>
      <text x="70" y="20" text-anchor="middle" font-size="10" fill="#ffedd5" font-weight="500">VPS Node A</text>
      <text x="70" y="40" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">sigma-agent</text>
      <text x="70" y="56" text-anchor="middle" font-size="9" fill="#fed7aa">heartbeat + port scan</text>
      <text x="70" y="68" text-anchor="middle" font-size="9" fill="#fed7aa">+ eBPF traffic + xDS</text>
    </g>
    <g class="node" transform="translate(160, 0)">
      <rect x="0" y="0" width="140" height="72" rx="8" fill="url(#gAgent)" filter="shadow" opacity="0.9"/>
      <text x="70" y="20" text-anchor="middle" font-size="10" fill="#ffedd5" font-weight="500">VPS Node B</text>
      <text x="70" y="40" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">sigma-agent</text>
      <text x="70" y="56" text-anchor="middle" font-size="9" fill="#fed7aa">heartbeat + port scan</text>
      <text x="70" y="68" text-anchor="middle" font-size="9" fill="#fed7aa">+ eBPF traffic + xDS</text>
    </g>
    <g class="node" transform="translate(320, 0)">
      <rect x="0" y="0" width="110" height="72" rx="8" fill="#292524" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="55" y="20" text-anchor="middle" font-size="10" fill="#f97316" font-weight="500">VPS Node ...</text>
      <text x="55" y="40" text-anchor="middle" font-size="12" fill="#fed7aa" font-weight="600">agent</text>
      <text x="55" y="56" text-anchor="middle" font-size="9" fill="#a8a29e">N instances</text>
    </g>
  </g>

  <!-- Probe nodes -->
  <g transform="translate(680, 770)">
    <g class="node" transform="translate(0, 0)">
      <rect x="0" y="0" width="140" height="72" rx="8" fill="url(#gProbe)" filter="shadow" opacity="0.9"/>
      <text x="70" y="20" text-anchor="middle" font-size="10" fill="#fce7f3" font-weight="500">China Node</text>
      <text x="70" y="40" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">sigma-probe</text>
      <text x="70" y="56" text-anchor="middle" font-size="9" fill="#fbcfe8">ICMP/TCP/HTTP</text>
      <text x="70" y="68" text-anchor="middle" font-size="9" fill="#fbcfe8">reachability checks</text>
    </g>
    <g class="node" transform="translate(160, 0)">
      <rect x="0" y="0" width="140" height="72" rx="8" fill="url(#gProbe)" filter="shadow" opacity="0.9"/>
      <text x="70" y="20" text-anchor="middle" font-size="10" fill="#fce7f3" font-weight="500">China Node</text>
      <text x="70" y="40" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">sigma-probe</text>
      <text x="70" y="56" text-anchor="middle" font-size="9" fill="#fbcfe8">ICMP/TCP/HTTP</text>
      <text x="70" y="68" text-anchor="middle" font-size="9" fill="#fbcfe8">reachability checks</text>
    </g>
  </g>

  <!-- Arrows: Agents -> API (through ingress) -->
  <path d="M 200 770 L 200 730 Q 200 718 280 716 L 760 716 Q 840 716 840 704 L 840 298" stroke="#f97316" stroke-width="1.2" fill="none" marker-end="url(#arrowOrange)" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="520" y="710" font-size="9" fill="#f97316" text-anchor="middle">/api/agent/heartbeat, /api/agent/register</text>

  <!-- Arrows: Probes -> API -->
  <path d="M 830 770 L 830 730 Q 830 718 840 716 L 860 716 Q 880 716 880 704 L 880 298" stroke="#ec4899" stroke-width="1.2" fill="none" marker-end="url(#arrow)" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="960" y="710" font-size="9" fill="#ec4899" text-anchor="middle">/api/ip-checks</text>

  <!-- ==================== ConfigMap + Secret callouts ==================== -->
